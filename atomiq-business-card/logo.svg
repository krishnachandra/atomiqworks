<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="globe-gradient" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#00C2A8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0b1330" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Nucleus -->
  <circle cx="50" cy="50" r="14" fill="url(#globe-gradient)" stroke="#00C2A8" stroke-width="1" />

  <!-- Orbit 1 (Horizontalish/30deg) -->
  <g transform="rotate(30 50 50)">
    <ellipse cx="50" cy="50" rx="40" ry="12" fill="none" stroke="#00C2A8" stroke-width="1" stroke-opacity="0.4" />
    <circle cx="90" cy="50" r="3.5" fill="#00C2A8" filter="url(#glow)" />
  </g>

  <!-- Orbit 2 (-30deg) -->
  <g transform="rotate(-30 50 50)">
    <ellipse cx="50" cy="50" rx="40" ry="12" fill="none" stroke="#00C2A8" stroke-width="1" stroke-opacity="0.4" />
    <circle cx="10" cy="50" r="3.5" fill="#00C2A8" filter="url(#glow)" />
  </g>

  <!-- Orbit 3 (Vertical/90deg) -->
  <g transform="rotate(90 50 50)">
    <ellipse cx="50" cy="50" rx="40" ry="12" fill="none" stroke="#00C2A8" stroke-width="1" stroke-opacity="0.4" />
    <circle cx="50" cy="10" r="3.5" fill="#00C2A8" filter="url(#glow)" />
  </g>
</svg>
