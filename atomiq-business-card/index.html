                    </div>
                </header>

                <!-- Main Branding Content Area -->

                    <div class="branding" id="brandingGroup">
                        <!-- Logo -->
                        <div class="logo-container" aria-hidden="true">
                            <img src="atom-logo.png" alt="AtomIQWorks Logo" width="100%" height="100%" />
                        </div>
                        <!-- Wordmark -->
                        <h1 class="wordmark">AtomIQ<span class="works">Works</span></h1>

                        <span class="creation-tag tag-apps">Apps</span>

                </div>
            </article>
        </div>

        <!-- BACK VIEW -->

            <h2 class="view-title">Back</h2>
            <article class="micro-card back-side" id="cardBackElement" aria-label="atomIQworks Business Card Back">
                <!-- Browser Chrome -->
                <header class="chrome-bar" aria-hidden="true">
                    <div class="chrome-dots">
                        <div class="dot close"></div>
                        <div class="dot min"></div>
                        <div class="dot max"></div>
                    </div>
                    <div class="url-bar">/ContactInfo</div>
                    <div class="chrome-contact">
                        <svg class="whatsapp-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="10"
                            height="10">
                            <path
                                d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.7 17.8 69.7 27.2 106.2 27.2 122.4 0 222-99.6 222-222 0-59.3-23-115.1-65-157.1zM223.9 446.3c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3 18.7-68.1-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.4-8.6-44.6-27.6-16.5-14.7-27.7-33-30.9-38.5-3.2-5.5-.3-8.5 2.5-11.2 2.5-2.5 5.5-6.5 8.3-9.8 2.8-3.3 3.7-5.6 5.5-9.3 1.9-3.7.9-6.9-.5-9.8-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.5 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z" />
                        </svg>
                        <span>+91-9790925028</span>
                    </div>
                </header>

                <main class="card-content">
                    <div class="contact-layout">
                        <!-- Info Section -->
                        <div class="contact-info">
                            <div class="stats-container">
                                <div class="stat-item">
                                    <span class="stat-value">150+</span>
                                    <span class="stat-label">Projects</span>
                                </div>
                                <div class="stat-divider">|</div>
                                <div class="stat-item">
                                    <span class="stat-value">18+</span>
                                    <span class="stat-label">Years Exp</span>
                                </div>
                            </div>

                            <div class="contact-links">
                                <span class="link-item">www.atomiqworks.com</span>
                                <span class="link-item">atomiqworks@gmail.com</span>
                                <span class="link-item">+91-8074535932</span>
                            </div>
                        </div>

                        <!-- QR Section for Innovation vibe -->
                        <div class="qr-placeholder" aria-hidden="true">
                            <div class="qr-code">
                                <img src="qr-code.png" alt="Scan to connect" width="56" height="56"
                                    style="object-fit: contain;">
                            </div>
                            <div class="qr-wordmark">AtomIQ<span class="works">Works</span></div>
                            <p class="tagline qr-tagline">Building what matters</p>
                        </div>
                    </div>
                </main>
            </article>
        </div>
    </div>

    <!-- Demo Environment Controls -->
    <nav class="demo-controls" aria-label="Demo controls">
        <button class="ctrl-btn" onclick="toggleTheme()" title="Toggle Light/Dark Theme">🌓 Theme</button>
        <button class="ctrl-btn" onclick="toggleLayout()" title="Switch layout axis (Stack / Compact)">📐
            Layout</button>
        <button class="ctrl-btn" onclick="toggleUrl()" title="Toggle URL bar text">🔗 URL</button>
        <button class="ctrl-btn" onclick="toggleInspect()" title="Developer CSS Inspector Overlay">🔎 Inspect</button>
        <button class="ctrl-btn" onclick="downloadPreview()" title="Download 2x PNG">📸 Save 2x PNG</button>
    </nav>

    <!-- html-to-image for capturing the card -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

    <script>
        const htmlEl = document.documentElement;
        const cardEl = document.getElementById('cardElement');
        const cardBackEl = document.getElementById('cardBackElement');
        const urlText = document.getElementById('urlText');
        const inspectOverlay = document.getElementById('inspectOverlay');

        let isDark = false;
        let isCompact = false;
        let isPreviewMode = false;

        function toggleTheme() {
            isDark = !isDark;
            htmlEl.setAttribute('data-theme', isDark ? 'dark' : 'light');
        }

        function toggleLayout() {
            isCompact = !isCompact;
            const container = document.querySelector('.cards-container');
            if (isCompact) {
                container.classList.add('compact-view');
            } else {
                container.classList.remove('compact-view');
            }
        }

        function toggleUrl() {
            isPreviewMode = !isPreviewMode;
            urlText.textContent = isPreviewMode ? "preview mode" : "www.atomiqworks.com";
        }

        function toggleInspect() {
            inspectOverlay.classList.toggle('active');
        }

        async function downloadPreview() {
            try {
                const container = document.querySelector('.cards-container');
                const scale = 2;
                const rect = container.getBoundingClientRect();

                const dataUrl = await htmlToImage.toPng(container, {
                    pixelRatio: scale,
                    style: {
                        transform: `scale(${scale})`,
                        transformOrigin: 'top left',
                        width: `${rect.width}px`,
                        height: `${rect.height}px`
                    },
                    width: rect.width * scale,
                    height: rect.height * scale
                });

                const link = document.createElement('a');
                link.download = 'atomiq-business-card-preview@2x.png';
                link.href = dataUrl;
                link.click();
            } catch (error) {
                console.error('Error generating image!', error);
                alert("Failed to capture preview.");
            }
        }
    </script>
</body>

</html>
