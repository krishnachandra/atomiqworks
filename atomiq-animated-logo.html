<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtomiqWorks - Animated Logo</title>
    <style>
        /* ====================================
           RESET & BASE STYLES
        ==================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* ====================================
           LOGO CONTAINER
           - Responsive sizing using custom properties
           - Easy to adjust scale
        ==================================== */
        .atomiq-logo {
            --logo-size: 300px;
            --globe-size: calc(var(--logo-size) * 0.35);
            --orbit-size: calc(var(--logo-size) * 0.85);
            --atom-size: 18px;
            
            position: relative;
            width: var(--logo-size);
            height: var(--logo-size);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ====================================
           GLOBE (CENTER NUCLEUS)
           - Represents Earth / global presence
           - Subtle continent hints via gradients
           - Clean, minimal design
        ==================================== */
        .globe {
            position: relative;
            width: var(--globe-size);
            height: var(--globe-size);
            border-radius: 50%;
            background: linear-gradient(135deg, #4a5f7a 0%, #5c7396 50%, #4a5f7a 100%);
            box-shadow: 
                0 0 30px rgba(76, 144, 186, 0.3),
                inset 5px 5px 15px rgba(0, 0, 0, 0.3),
                inset -5px -5px 15px rgba(255, 255, 255, 0.1);
            z-index: 10;
            
            /* Subtle breathing animation */
            animation: globe-breathe 8s ease-in-out infinite;
        }

        /* Globe grid overlay for "global digital presence" */
        .globe::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background-image: 
                linear-gradient(0deg, transparent 48%, rgba(255, 255, 255, 0.05) 49%, rgba(255, 255, 255, 0.05) 51%, transparent 52%),
                linear-gradient(90deg, transparent 48%, rgba(255, 255, 255, 0.05) 49%, rgba(255, 255, 255, 0.05) 51%, transparent 52%);
            background-size: 25px 25px;
            opacity: 0.6;
        }

        /* Continent hints - subtle overlay */
        .globe::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 35%;
            height: 45%;
            border-radius: 50% 30% 40% 50%;
            background: rgba(90, 110, 130, 0.3);
            filter: blur(3px);
        }

        /* Globe breathing animation */
        @keyframes globe-breathe {
            0%, 100% {
                transform: scale(1);
                box-shadow: 
                    0 0 30px rgba(76, 144, 186, 0.3),
                    inset 5px 5px 15px rgba(0, 0, 0, 0.3),
                    inset -5px -5px 15px rgba(255, 255, 255, 0.1);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 
                    0 0 40px rgba(76, 144, 186, 0.5),
                    inset 5px 5px 15px rgba(0, 0, 0, 0.3),
                    inset -5px -5px 15px rgba(255, 255, 255, 0.15);
            }
        }

        /* ====================================
           ORBIT PATHS
           - Three concentric orbital rings
           - Each rotated for visual variety
           - Uses transform-style: preserve-3d for depth
        ==================================== */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            width: var(--orbit-size);
            height: var(--orbit-size);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Orbit 1 - Teal Atom (8s rotation) */
        .orbit-1 {
            transform: translate(-50%, -50%) rotateZ(0deg) rotateY(65deg);
            animation: orbit-rotate-1 8s linear infinite;
        }

        /* Orbit 2 - Orange Atom (9s rotation, offset timing) */
        .orbit-2 {
            transform: translate(-50%, -50%) rotateZ(120deg) rotateY(65deg);
            animation: orbit-rotate-2 9s linear infinite;
            animation-delay: -3s;
        }

        /* Orbit 3 - Lime Atom (7s rotation, offset timing) */
        .orbit-3 {
            transform: translate(-50%, -50%) rotateZ(240deg) rotateY(65deg);
            animation: orbit-rotate-3 7s linear infinite;
            animation-delay: -1.5s;
        }

        /* Orbit rotation animations */
        @keyframes orbit-rotate-1 {
            from { transform: translate(-50%, -50%) rotateZ(0deg) rotateY(65deg) rotateZ(0deg); }
            to { transform: translate(-50%, -50%) rotateZ(0deg) rotateY(65deg) rotateZ(360deg); }
        }

        @keyframes orbit-rotate-2 {
            from { transform: translate(-50%, -50%) rotateZ(120deg) rotateY(65deg) rotateZ(0deg); }
            to { transform: translate(-50%, -50%) rotateZ(120deg) rotateY(65deg) rotateZ(360deg); }
        }

        @keyframes orbit-rotate-3 {
            from { transform: translate(-50%, -50%) rotateZ(240deg) rotateY(65deg) rotateZ(0deg); }
            to { transform: translate(-50%, -50%) rotateZ(240deg) rotateY(65deg) rotateZ(360deg); }
        }

        /* ====================================
           ATOMS (ELECTRONS)
           - Positioned on orbits
           - Soft modern colors
           - Smooth glow effects
        ==================================== */
        .atom {
            position: absolute;
            top: 0;
            left: 50%;
            width: var(--atom-size);
            height: var(--atom-size);
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 20px currentColor;
        }

        /* Atom 1 - Teal */
        .atom-1 {
            background: linear-gradient(135deg, #20E3B2, #29ffc6);
            color: #20E3B2;
        }

        /* Atom 2 - Soft Orange */
        .atom-2 {
            background: linear-gradient(135deg, #FF6B6B, #ff8787);
            color: #FF6B6B;
        }

        /* Atom 3 - Lime */
        .atom-3 {
            background: linear-gradient(135deg, #9EE493, #b5f1a9);
            color: #9EE493;
        }

        /* ====================================
           RESPONSIVE SCALING
           - Adjusts for different screen sizes
        ==================================== */
        @media (max-width: 768px) {
            .atomiq-logo {
                --logo-size: 200px;
                --atom-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .atomiq-logo {
                --logo-size: 150px;
                --atom-size: 12px;
            }
        }

        /* ====================================
           OPTIONAL: Brand name below logo
        ==================================== */
        .brand-name {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
            opacity: 0.9;
            white-space: nowrap;
        }

        .brand-name .highlight {
            color: #20E3B2;
        }

        /* ====================================
           NOTES FOR CUSTOMIZATION:
           
           🎨 CHANGE COLORS:
           - Globe: Update .globe background gradient
           - Atoms: Update .atom-1, .atom-2, .atom-3 backgrounds
           
           ⚡ CHANGE SPEED:
           - Orbit speeds: Update orbit-rotate-1/2/3 durations (currently 8s, 9s, 7s)
           - Globe breathing: Update globe-breathe duration (currently 8s)
           
           📏 CHANGE SIZE:
           - Adjust --logo-size in .atomiq-logo (default: 300px)
           - All other sizes scale proportionally
           
           🔧 EMBED IN WEBSITE:
           - Copy .atomiq-logo HTML block
           - Copy styles to your CSS file
           - Remove body styles if embedding in existing page
        ==================================== */
    </style>
</head>
<body>
    <!-- ====================================
         ATOMIQWORKS ANIMATED LOGO
         Pure HTML + CSS | No JavaScript
    ==================================== -->
    <div class="atomiq-logo">
        <!-- Central Globe -->
        <div class="globe"></div>
        
        <!-- Orbit 1 with Teal Atom -->
        <div class="orbit orbit-1">
            <div class="atom atom-1"></div>
        </div>
        
        <!-- Orbit 2 with Orange Atom -->
        <div class="orbit orbit-2">
            <div class="atom atom-2"></div>
        </div>
        
        <!-- Orbit 3 with Lime Atom -->
        <div class="orbit orbit-3">
            <div class="atom atom-3"></div>
        </div>
        
        <!-- Optional: Brand Name -->
        <div class="brand-name">
            <span class="highlight">Atomiq</span>Works
        </div>
    </div>
</body>
</html>
